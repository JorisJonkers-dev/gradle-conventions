# Publishes the convention plugin modules and aggregate to GitHub Packages when
# a vX.Y.Z tag is pushed. Independent of release-please (whose GITHUB_TOKEN PR
# flow is blocked by the org "Actions may create PRs" setting); a maintainer
# pushes the tag and this publishes that exact version.
name: Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Publish missing Gradle packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/publish-missing-github-packages.sh
